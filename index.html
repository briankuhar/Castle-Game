<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Castle Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="app">
        <button id="fullscreen-btn" aria-label="Toggle Fullscreen">
            <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
            <svg id="exit-fullscreen-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M8 3v3a2 2 0 0 1-2 2H3"></path><path d="M21 8h-3a2 2 0 0 1-2-2V3"></path><path d="M3 16h3a2 2 0 0 1 2 2v3"></path><path d="M16 21v-3a2 2 0 0 1 2-2h3"></path></svg>
        </button>
        <button id="clear-btn" aria-label="Clear Canvas">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
        <div id="canvas">
            <!-- Castle blocks will be dropped here -->
        </div>
        <div id="palette">
            <div class="palette-item">
                <div class="block square palette-block" data-type="square"></div>
            </div>
            <div class="palette-item">
                <div class="block rect-h palette-block" data-type="rect-h"></div>
            </div>
            <div class="palette-item">
                <div class="block rect-v palette-block" data-type="rect-v"></div>
            </div>
            <div class="palette-item">
                <div class="block arch palette-block" data-type="arch"></div>
            </div>
            <div class="palette-item">
                <div class="block triangle palette-block" data-type="triangle"></div>
            </div>
            <div class="palette-item">
                <div class="block window palette-block" data-type="window"></div>
            </div>
            <div class="palette-item">
                <div class="block door palette-block" data-type="door"></div>
            </div>
            <div class="palette-item">
                <div class="block support-left palette-block" data-type="support-left"></div>
            </div>
            <div class="palette-item">
                <div class="block support-right palette-block" data-type="support-right"></div>
            </div>
            <div class="palette-item">
                <div class="block spire palette-block" data-type="spire"></div>
            </div>
            <div class="palette-item">
                <div class="block banner palette-block" data-type="banner"></div>
            </div>
            <!-- Trash area indicator could go here, or just dragging back to palette deletes -->
        </div>
    </div>
</body>
</html>
